<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelBooking - Accedi o Registrati</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f4f6f9; margin: 0; font-family: sans-serif;">

    <nav class="navbar">
        <a href="index.html" class="logo">TravelBooking</a>
        <div class="nav-links">
            <a href="index.html" style="margin-left: 20px; font-weight: bold; color: #00aa6c; text-decoration: none;">Torna alla Home</a>
        </div>
    </nav>

    <div style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 80px); padding: 40px 20px;">
        <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 500px;">
            
            <div id="sezioneLogin">
                <h2 style="margin-top: 0; color: #333; text-align: center;">Accedi a TravelBooking</h2>
                
                <form action="LoginServlet" method="POST" id="formLoginPage">
                    <input type="hidden" name="actionType" value="login">

                    <div class="input-group">
                        <label for="loginEmailPage"> Email</label>
                        <input type="email" id="loginEmailPage" name="email" required placeholder="es. mario@email.it">
                    </div>

                    <div class="input-group">
                        <label for="loginPasswordPage">Password</label>
                        <input type="password" id="loginPasswordPage" name="password" required pattern=".{6,}" maxlength="20" placeholder="password">
                    </div>

                    <button type="submit" class="btn-submit-login" style="width: 100%; margin-top: 20px;">Accedi</button>
                </form>

                <p style="text-align: center; margin-top: 25px; font-size: 14px; color: #64748b;">
                    Se non sei registrato <a href="#" id="linkMostraIscrizione" style="color: #00aa6c; font-weight: bold; text-decoration: none;">clicca su iscriviti</a>
                </p>
            </div>


            <div id="sezioneRegistrazione" style="display: none;">
                <h2 style="margin-top: 0; color: #333; text-align: center;">Crea il tuo Account</h2>
                
                <form action="RegistrationServlet" method="POST" id="formSignupPage">
                    <input type="hidden" name="actionType" value="registration">

                    <div class="input-group">
                        <label for="signupNome">Nome</label>
                        <input type="text" id="signupNome" name="nome" required placeholder="nome">
                    </div>

                    <div class="input-group">
                        <label for="signupCognome">Cognome</label>
                        <input type="text" id="signupCognome" name="cognome" required placeholder="cognome">
                    </div>

                    <div class="input-group">
                        <label for="signupDataNascita">Data di Nascita</label>
                        <input type="date" id="signupDataNascita" name="data_nascita" required>
                    </div>

                    <div class="input-group">
                        <label for="signupEmail"> Email</label>
                        <input type="email" id="signupEmail" name="email" required placeholder="es. mario.rossi@email.it">
                    </div>

                    <div class="input-group">
                        <label for="signupPassword">Password </label>
                        <input type="password" id="signupPassword" name="password" required pattern=".{6,}" maxlength="20" placeholder="password">
                    </div>

                    <div class="input-group">
                        <label for="signupIndirizzo">Indirizzo di Residenza</label>
                        <input type="text" id="signupIndirizzo" name="indirizzo" required placeholder="es. Via Roma 10, Napoli">
                    </div>

                    <div class="input-group">
                        <label>Numeri di Telefono</label>
                        <div id="phonesContainer"></div>
                        <button type="button" class="btn-add-phone" onclick="addPhone()" style="margin-top: 5px; background: #e2e8f0; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; color: #333;">+ Aggiungi Telefono</button>
                    </div>

                    <button type="submit" class="btn-submit-login" style="background-color: #00aa6c; width: 100%; margin-top: 25px;">Registrati</button>
                </form>

                <p style="text-align: center; margin-top: 25px; font-size: 14px; color: #64748b;">
                    Hai già un account? <a href="#" id="linkMostraLogin" style="color: #00aa6c; font-weight: bold; text-decoration: none;">Accedi qui</a>
                </p>
            </div>

        </div>
    </div>

    <script src="scripts/validate.js"></script>
</body>
</html>
